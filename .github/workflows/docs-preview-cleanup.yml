name: Docs Preview Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Remove preview
        run: bash .github/scripts/docs-pages.sh remove-preview ${{ github.event.pull_request.number }}
