name: Barista — Issue Triage

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to (re)triage
        required: true
        type: number

permissions:
  contents: read
  issues: write

concurrency:
  group: barista-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  triage:
    # Kill switch: set repo variable BARISTA_ENABLED=true to enable.
    # Comment-trigger gating: only run on /barista commands from maintainers, on issues (not PRs).
    if: >-
      vars.BARISTA_ENABLED == 'true' && (
        github.event_name == 'issues' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          contains(github.event.comment.body, '/barista') &&
          (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need history so barista can inspect recent commits near suspected files.
          fetch-depth: 200

      - name: Mint barista app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BARISTA_APP_ID }}
          private-key: ${{ secrets.BARISTA_PRIVATE_KEY }}

      - name: Resolve issue number
        id: issue
        run: |
          case "${{ github.event_name }}" in
            issues|issue_comment)
              echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Acknowledge /barista comment with reaction
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content=eyes

      - name: Run Barista
        id: run-barista
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BARISTA_ISSUE: ${{ steps.issue.outputs.number }}
          BARISTA_EVENT: ${{ github.event_name }}
          BARISTA_COMMENT_BODY: ${{ github.event.comment.body }}
          BARISTA_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_non_write_users: "*"
          # Renders a human-readable transcript in the Actions run's Step Summary
          # (formatted markdown). Avoid show_full_output which dumps raw JSON in logs.
          display_report: "true"
          prompt: "/barista-triage REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ steps.issue.outputs.number }} EVENT: ${{ github.event_name }}"

      - name: Append run-stats footer to barista's comment
        if: always() && steps.run-barista.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXECUTION_FILE: ${{ steps.run-barista.outputs.execution_file }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REPO: ${{ github.repository }}
        run: ./.github/barista/scripts/append-stats.sh
