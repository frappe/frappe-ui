name: Barista — Issue Triage

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to (re)triage
        required: true
        type: number

permissions:
  contents: read
  issues: write

concurrency:
  group: barista-${{ github.event.issue.number || inputs.issue_number }}
  # Queue, don't cancel: an in-flight triage may already have decided labels and
  # be midway through posting a comment — losing that to a `/barista retriage`
  # comment would leave the issue in a half-triaged state.
  cancel-in-progress: false

jobs:
  triage:
    # Kill switch: set repo variable BARISTA_ENABLED=true to enable.
    # Comment-trigger gating: only run on /barista commands from maintainers, on issues (not PRs).
    if: >-
      vars.BARISTA_ENABLED == 'true' && (
        github.event_name == 'issues' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          contains(github.event.comment.body, '/barista') &&
          (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Barista
        id: setup
        uses: ./.github/actions/barista-setup
        with:
          app-id: ${{ secrets.BARISTA_APP_ID }}
          private-key: ${{ secrets.BARISTA_PRIVATE_KEY }}
          # History so barista can inspect recent commits near suspected files.
          fetch-depth: '200'
          dispatch-number: ${{ inputs.issue_number }}

      - name: Run Barista
        id: run-barista
        uses: ./.github/actions/barista-run
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          app-token: ${{ steps.setup.outputs.app-token }}
          repo: ${{ github.repository }}
          issue-number: ${{ steps.setup.outputs.number }}
          event: ${{ github.event_name }}
          comment-body: ${{ github.event.comment.body }}
          comment-author: ${{ github.event.comment.user.login }}
          prompt: "/barista-triage REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ steps.setup.outputs.number }} EVENT: ${{ github.event_name }}"
          model: ${{ vars.BARISTA_MODEL }}

      - name: Append run-stats footer
        if: always() && steps.run-barista.outcome == 'success'
        uses: ./.github/actions/barista-append-stats
        with:
          token: ${{ steps.setup.outputs.app-token }}
          repo: ${{ github.repository }}
          issue-number: ${{ steps.setup.outputs.number }}
          execution-file: ${{ steps.run-barista.outputs.execution-file }}
