name: Barista — Fix (open PR)

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to attempt a fix for
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: barista-fix-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  fix:
    # Kill switches:
    #   - BARISTA_ENABLED=true enables barista globally.
    #   - BARISTA_FIX_ENABLED=true enables this (write-mode) workflow specifically.
    # Trigger: restricted to @netchampfaris only — write-mode runs by no one else.
    if: >-
      vars.BARISTA_ENABLED == 'true' &&
      vars.BARISTA_FIX_ENABLED == 'true' && (
        (
          github.event_name == 'workflow_dispatch' &&
          github.actor == 'netchampfaris'
        ) ||
        (
          github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          contains(github.event.comment.body, '/barista fix') &&
          github.event.comment.user.login == 'netchampfaris'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Mint barista app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BARISTA_APP_ID }}
          private-key: ${{ secrets.BARISTA_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Need full history so barista can create a branch off main and push.
          fetch-depth: 0

      - name: Resolve issue number
        id: issue
        run: |
          case "${{ github.event_name }}" in
            issue_comment)
              echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Acknowledge /barista fix with reaction
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -f content=eyes

      - name: Configure git identity for barista[bot]
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # App ID needed to derive the bot's noreply email.
          APP_SLUG=$(gh api /app --jq .slug)
          APP_ID=$(gh api /app --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Prepare working branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          BRANCH="barista/issue-${ISSUE_NUMBER}"
          # If the branch already exists on the remote, reset it to base so each
          # /barista fix invocation starts from a clean main.
          git fetch origin "${{ github.event.repository.default_branch }}"
          git checkout -B "$BRANCH" "origin/${{ github.event.repository.default_branch }}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"

      - name: Run Barista (fix mode)
        id: run-barista
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BARISTA_ISSUE: ${{ steps.issue.outputs.number }}
          BARISTA_EVENT: ${{ github.event_name }}
          BARISTA_COMMENT_BODY: ${{ github.event.comment.body }}
          BARISTA_COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          BARISTA_BRANCH: ${{ steps.branch.outputs.name }}
          BARISTA_BASE: ${{ steps.branch.outputs.base }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_non_write_users: "*"
          display_report: "true"
          prompt: "/barista-fix REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ steps.issue.outputs.number }} EVENT: ${{ github.event_name }} BRANCH: ${{ steps.branch.outputs.name }} BASE: ${{ steps.branch.outputs.base }}"

      - name: Append run-stats footer to barista's comment
        if: always() && steps.run-barista.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXECUTION_FILE: ${{ steps.run-barista.outputs.execution_file }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          REPO: ${{ github.repository }}
        run: ./.github/barista/scripts/append-stats.sh
