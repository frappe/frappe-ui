name: Format Check

on:
  pull_request:
    push:
      branches: [main]

jobs:
  oxfmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check
