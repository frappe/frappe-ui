name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run vitest with coverage
        run: yarn test:coverage

      - name: Upload Vitest coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-vitest
          path: coverage/vitest
          if-no-files-found: ignore

  component-test:
    runs-on: ubuntu-latest
    name: Component Tests (Cypress) - ${{ matrix.containers }}
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Run Component Tests
        uses: cypress-io/github-action@v6
        with:
          component: true
          build: 'yarn build'
          start: 'yarn dev'
          install: false
        env:
          COVERAGE: 'true'
          SPLIT: ${{ strategy.job-total }}
          SPLIT_INDEX: ${{ strategy.job-index }}

      - name: Upload Cypress screenshots if tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: cypress/screenshots

      - name: Upload Cypress coverage shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cypress-${{ matrix.containers }}
          path: coverage/cypress
          if-no-files-found: ignore

  coverage-report:
    needs: [test, component-test]
    if: always() && (needs.test.result == 'success' || needs.component-test.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download Vitest coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-vitest
          path: coverage/vitest
        continue-on-error: true

      - name: Download Cypress coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-cypress-*
          path: coverage/cypress-shards
        continue-on-error: true

      - name: Merge Cypress shards
        run: yarn tsx scripts/merge-cypress-shards.ts

      - name: Merge Vitest + Cypress
        run: yarn coverage:merge

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-final
          path: coverage/final

      - name: Upload coverage summary (for delta baseline)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/final/coverage-summary.json

      - name: Download main baseline coverage summary
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: tests.yml
          branch: main
          event: push
          name: coverage-summary
          path: coverage-baseline
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Update PR description with coverage
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: yarn tsx scripts/update-pr-coverage.ts
