name: Barista — React to /barista comment
description: Post an "eyes" reaction on the maintainer's /barista comment so they know it was received.
inputs:
  token:
    description: GitHub App token with issues:write
    required: true
  repo:
    description: owner/repo (e.g. frappe/frappe-ui)
    required: true
  comment-id:
    description: ID of the issue_comment that triggered the run
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repo }}
        COMMENT_ID: ${{ inputs.comment-id }}
      run: |
        gh api \
          --method POST \
          -H "Accept: application/vnd.github+json" \
          "/repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
          -f content=eyes
